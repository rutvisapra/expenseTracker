<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body">
          <h2 class="text-center mb-4">Add Expense</h2>
          <form (ngSubmit)="onSubmit()" #expenseForm="ngForm">
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input type="text" class="form-control" [(ngModel)]="title" name="title" required #titleInput="ngModel">
              <div *ngIf="titleInput.invalid && titleInput.touched" class="text-danger">
                Title is required
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Amount</label>
              <input type="number" step="0.01" min="0.01" class="form-control" [(ngModel)]="amount" name="amount" required #amountInput="ngModel">
              <div *ngIf="amountInput.invalid && amountInput.touched" class="text-danger">
                Please enter a valid amount
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select class="form-select" [(ngModel)]="category" name="category" required>
                <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Date</label>
              <input type="date" class="form-control" [(ngModel)]="date" name="date" required #dateInput="ngModel">
              <div *ngIf="dateInput.invalid && dateInput.touched" class="text-danger">
                Date is required
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" [disabled]="expenseForm.invalid">Add Expense</button>
            <button type="button" class="btn btn-secondary w-100 mt-2" routerLink="/dashboard">Cancel</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
